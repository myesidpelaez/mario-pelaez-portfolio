<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#05070c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>
  <!-- Letter M centered -->
  <text
    x="16"
    y="22"
    font-family="'Inter', 'Plus Jakarta Sans', 'Arial', sans-serif"
    font-size="19"
    font-weight="800"
    fill="url(#letter)"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-0.5"
  >M</text>
</svg>
